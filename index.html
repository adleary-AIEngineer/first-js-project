<!DOCTYPE html>
<hmtl lang="en">
    <head>
        <meta charset=""UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Expense Tracker</title>
        <!-- CSS linked here -->
        <link rel="stylesheet" href="style.css">
    </head>

    <body style="background-color: grey;">
        <div class="container">
            <div class="box" id="expenses">
            <h2>Expenses</h2>
                <span class="tooltip">
                Write some message here
                </span>
            </div>

            <div class="box" id="income">
            <h2>Income</h2>
                <span class="tooltip">
                Add some additional information here.
                </span>
            </div>

            <div class="box" id="reports">
            <h2>Reports</h2>
                <span class="tooltip">
                And don't forget to add information here.
                </span>
            </div>

            <div class="box"  id="settings">
            <h2>Settings</h2>
                <span class="tooltip">
                This is the last box to have information.
                </span>
            </div>

        </div>
        
        <div id="details">
        Click a box to see more information.
        </div>



        <!-- Javascript linked here -->
         <script src="script.js"></script>
    </body>
</hmtl>
